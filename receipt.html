<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />
    <title>Квитанция</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body { margin: 0; min-height: 100%; background: #fff; }
      .receipt-screen { width: 100vw; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 0; background: #f1f1f1; }
      .receipt-wrapper { width: 100%; height: 100%; max-width: 100vw; max-height: 100vh; display: grid; place-items: center; }
      .receipt-object { width: 100%; max-width: 100vw; max-height: 100vh; border: 0; }
      .receipt-back { position: fixed; top: 18px; left: 18px; z-index: 10; width: 42px; height: 42px; border: 0; border-radius: 50%; background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,.12); color: #333; font-size: 26px; cursor: pointer; }
      @media (max-width: 600px) { .receipt-back { top: 12px; left: 12px; width: 38px; height: 38px; font-size: 24px; } }
    </style>
  </head>
  <body>
    <button class="receipt-back" onclick="history.back()" aria-label="Назад">×</button>
    <main class="receipt-screen">
      <div class="receipt-wrapper">
        <object class="receipt-object" data="assets/чек.svg" type="image/svg+xml">Ваш браузер не поддерживает SVG.</object>
      </div>
    </main>
  </body>
</html>
