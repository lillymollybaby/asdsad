<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />
    <title>Квитанция</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body { margin: 0; min-height: 100%; background: #f1f1f1; }

      .receipt-screen {
        width: 100vw;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px 0;
        background: #f1f1f1;
      }

      /* карточка + панель кнопок теперь одна визуальная колонка */
      .receipt-wrapper {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .receipt-object {
        width: 100%;
        max-width: 100%;
        display: block;
        border-radius: 32px 32px 0 0;   /* низ не скругляем — там сразу продолжается панель кнопок */
        overflow: hidden;
        background: #fff;
      }

      .receipt-back {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 10;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 10px 25px rgba(0,0,0,.12);
        color: #333;
        font-size: 26px;
        cursor: pointer;
      }
      @media (max-width: 600px) {
        .receipt-back { top: 12px; left: 12px; width: 38px; height: 38px; font-size: 24px; }
      }

      /* ---- настоящая, кликабельная панель кнопок ---- */
      .receipt-actions {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
        background: #fff;
        padding: 18px 8px 22px;
        border-radius: 0 0 32px 32px;
        box-shadow: 0 20px 40px rgba(0,0,0,.06);
      }

      .action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        background: none;
        border: 0;
        padding: 6px 2px;
        cursor: pointer;
        font-family: inherit;
        -webkit-tap-highlight-color: transparent;
      }

      .action-btn__circle {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: #fafafa;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background .15s ease, transform .1s ease;
      }

      .action-btn:active .action-btn__circle {
        background: #eee;
        transform: scale(.94);
      }

      .action-btn__circle svg {
        width: 24px;
        height: 24px;
        stroke: #111;
        stroke-width: 1.7;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .action-btn__label {
        font-size: 12px;
        line-height: 1.25;
        color: #111;
        text-align: center;
        max-width: 78px;
      }

      /* состояние "сохранено в избранное" — звезда закрашивается */
      .action-btn.is-active .action-btn__circle svg {
        fill: #111;
      }

      /* состояние отправки запроса на отмену */
      .action-btn[disabled] {
        opacity: .4;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <button class="receipt-back" onclick="history.back()" aria-label="Назад">×</button>

    <main class="receipt-screen">
      <div class="receipt-wrapper">
        <object class="receipt-object" data="assets/чек.svg" type="image/svg+xml">
          Ваш браузер не поддерживает SVG.
        </object>

        <div class="receipt-actions">
          <button class="action-btn" id="btn-share" type="button">
            <span class="action-btn__circle">
              <!-- share (iOS style: box + стрелка вверх) -->
              <svg viewBox="0 0 24 24">
                <path d="M12 15V3" />
                <path d="M8 7l4-4 4 4" />
                <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7" />
              </svg>
            </span>
            <span class="action-btn__label">Поделиться</span>
          </button>

          <button class="action-btn" id="btn-repeat" type="button">
            <span class="action-btn__circle">
              <!-- repeat / повторить перевод -->
              <svg viewBox="0 0 24 24">
                <path d="M3 12a9 9 0 0 1 15.3-6.4L21 8" />
                <path d="M21 3v5h-5" />
                <path d="M21 12a9 9 0 0 1-15.3 6.4L3 16" />
                <path d="M3 21v-5h5" />
              </svg>
            </span>
            <span class="action-btn__label">Повторить перевод</span>
          </button>

          <button class="action-btn" id="btn-cancel" type="button">
            <span class="action-btn__circle">
              <!-- запрет / запросить отмену -->
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="9" />
                <path d="M5.5 18.5l13-13" />
              </svg>
            </span>
            <span class="action-btn__label">Запросить отмену</span>
          </button>

          <button class="action-btn" id="btn-favorite" type="button">
            <span class="action-btn__circle">
              <!-- star / сохранить в частые -->
              <svg viewBox="0 0 24 24">
                <path d="M12 3.5l2.6 5.6 6.1.6-4.6 4.1 1.3 6-5.4-3.2-5.4 3.2 1.3-6-4.6-4.1 6.1-.6z" />
              </svg>
            </span>
            <span class="action-btn__label">Сохранить в Частые</span>
          </button>
        </div>
      </div>
    </main>

    <script>
      // ---- Поделиться ----
      document.getElementById('btn-share').addEventListener('click', async () => {
        const shareData = {
          title: 'Квитанция',
          text: 'Перевод успешно совершён',
          // url: window.location.href, // подставь ссылку на квитанцию/чек, если она есть
        };
        try {
          if (navigator.share) {
            await navigator.share(shareData);
          } else {
            // фолбэк для десктопа / браузеров без Web Share API
            await navigator.clipboard.writeText(shareData.text);
            alert('Скопировано в буфер обмена');
          }
        } catch (e) {
          // пользователь просто закрыл системное окно "поделиться" — ничего страшного
        }
      });

      // ---- Повторить перевод ----
      document.getElementById('btn-repeat').addEventListener('click', () => {
        // TODO: подставь свою логику — например переход на экран перевода
        // с предзаполненными реквизитами получателя из этой квитанции
        window.location.href = 'index.html';
      });

      // ---- Запросить отмену ----
      document.getElementById('btn-cancel').addEventListener('click', (e) => {
        const btn = e.currentTarget;
        const ok = confirm('Запросить отмену перевода?');
        if (!ok) return;
        // TODO: тут будет реальный вызов API отмены перевода
        btn.setAttribute('disabled', 'true');
        btn.querySelector('.action-btn__label').textContent = 'Запрос отправлен';
      });

      // ---- Сохранить в Частые ----
      document.getElementById('btn-favorite').addEventListener('click', (e) => {
        const btn = e.currentTarget;
        const active = btn.classList.toggle('is-active');
        btn.querySelector('.action-btn__label').textContent = active
          ? 'Сохранено'
          : 'Сохранить в Частые';
        // TODO: сохранить получателя в список "Частые" (localStorage / бэкенд)
      });
    </script>
  </body>
</html>
