<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Переводы</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="screen">
      <section class="success" aria-labelledby="page-title">
        <h1 id="page-title">Переводы</h1>
        <div class="success-icon" aria-label="Перевод выполнен">
          <img class="success-image" src="assets/check.png" alt="" />
        </div>
        <p class="success-message">Ваш перевод совершен</p>
        <p class="amount"><span id="amount-value">100</span> ₸</p>
      </section>

      <section class="details" aria-label="Детали перевода">
        <button class="detail-row receipt" type="button">
          <span class="row-icon" aria-hidden="true"><img class="receipt-image" src="assets/receipt.png" alt="" /></span>
          <span class="row-copy"><strong>Показать квитанцию</strong><small>Квитанция сохранена в Истории</small></span>
          <span class="chevron" aria-hidden="true"></span>
        </button>
        <button class="detail-row favorite" type="button">
          <span class="row-icon" aria-hidden="true"><img class="favorite-image" src="assets/favorite.png" alt="" /></span>
          <span class="row-copy"><strong id="recipient-name">Мирас Ж.</strong><small>Сохранить в Частые</small></span>
          <span class="switch" aria-hidden="true"><span></span></span>
        </button>

      </section>

      <section class="recommendations" aria-labelledby="recommendations-title">
        <h2 id="recommendations-title">Вас могут заинтересовать</h2>
        <div class="product-grid">
          <button class="product-card edit-trigger" type="button" data-editor="amount" aria-label="Изменить сумму перевода"><img src="assets/cow.PNG" alt="Бегающий теленок" /><span class="product-price">2 098 ₸</span></button>
          <button class="product-card edit-trigger" type="button" data-editor="name" aria-label="Изменить имя получателя"><img src="assets/shoes.PNG" alt="Белые кроссовки" /><span class="product-price">2 120 ₸</span></button>
        </div>
        <button class="back-button" type="button">Вернуться в Переводы</button>
      </section>
    </main>
    <dialog class="editor-dialog" id="editor-dialog" aria-labelledby="editor-title">
      <form class="editor-form" id="editor-form">
        <button class="dialog-close" type="button" aria-label="Закрыть">×</button>
        <h2 id="editor-title">Изменить</h2>
        <label id="editor-label" for="editor-input">Значение</label>
        <input id="editor-input" required autocomplete="off" />
        <button class="dialog-save" type="submit">Сохранить</button>
      </form>
    </dialog>
    <script src="app.js"></script>
  </body>
</html>
